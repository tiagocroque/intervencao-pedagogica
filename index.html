<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guia Pedagógico - Marista Escola Social Irmão Walmir</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="marista-header">
    <div class="logo-container">
      <div class="logo-text">
        <span class="marista-brand">Marista Brasil</span>
        <span class="escola-name">| Escola Social Irmão Walmir</span>
      </div>
    </div>
    <nav class="tabs">
      <button class="tab-btn active" onclick="abrirAba(event, 'aba-intervencoes')">Intervenções Práticas</button>
      <button class="tab-btn" onclick="abrirAba(event, 'aba-praticas')">Práticas Restaurativas</button>
      <button class="tab-btn" onclick="abrirAba(event, 'aba-circulos')">Círculos Restaurativos</button>
      <button class="tab-btn" onclick="abrirAba(event, 'aba-cnv')">Comunicação Não Violenta (CNV)</button>
    </nav>
  </header>

  <div class="container">
    
    <div id="aba-intervencoes" class="tab-content" style="display: flex;">
      <div class="sidebar">
        <h2>📘 Guia Rápido</h2>
        <input type="text" placeholder="Buscar intervenção..." oninput="buscar(this.value)">
        <div id="menu"></div>
      </div>
      <div class="main">
        <h1 id="titulo">Selecione uma intervenção</h1>
        <div id="conteudo">Utilize o menu lateral para explorar as estratégias para os 48 minutos de aula.</div>
      </div>
    </div>

    <div id="aba-praticas" class="tab-content">
      <div class="main full-width" id="conteudo-praticas"></div>
    </div>

    <div id="aba-circulos" class="tab-content">
      <div class="main full-width" id="conteudo-circulos"></div>
    </div>

    <div id="aba-cnv" class="tab-content">
      <div class="main full-width" id="conteudo-cnv"></div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
